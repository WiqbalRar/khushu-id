stages:
  - check
  - build
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/khushu/${CI_COMMIT_TAG}"

# ---------------------------------------------------------------------------
# Code Quality Checks
# ---------------------------------------------------------------------------
check:
  stage: check
  image: ubuntu:24.04
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID
  before_script:
    - apt-get update
    - apt-get install -y curl build-essential pkg-config gettext
        libgtk-4-dev libadwaita-1-dev libgeoclue-2-dev libasound2-dev
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable -c clippy -c rustfmt
    - export PATH="$HOME/.cargo/bin:$PATH"
  script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - cargo fmt --check
    - cargo clippy -- -D warnings
    - cargo test

# ---------------------------------------------------------------------------
# Build Debian Package
# ---------------------------------------------------------------------------
build-deb:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  image: ubuntu:24.04
  before_script:
    - apt-get update
    - apt-get install -y curl
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - export PATH="$HOME/.cargo/bin:$PATH"
    - apt-get install -y
        debhelper
        meson
        ninja-build
        pkg-config
        gettext
        libgtk-4-dev
        libadwaita-1-dev
        libgeoclue-2-dev
        libasound2-dev
  script:
    - export PATH="$HOME/.cargo/bin:$PATH"
    - ln -s packaging/debian debian
    - dpkg-buildpackage -us -uc -b
    - mkdir -p output && cp ../*.deb output/
  artifacts:
    paths:
      - output/*.deb

# ---------------------------------------------------------------------------
# Build RPM Package
# ---------------------------------------------------------------------------
build-rpm:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  image: fedora:latest
  before_script:
    - dnf install -y
        meson
        ninja-build
        gcc
        cargo
        rust
        gtk4-devel
        libadwaita-devel
        pkgconf-pkg-config
        geoclue2-devel
        alsa-lib-devel
        gettext
        rpm-build
        rpmdevtools
  script:
    - VERSION="${CI_COMMIT_TAG#v}"
    - rpmdev-setuptree
    - tar czf ~/rpmbuild/SOURCES/v${VERSION}.tar.gz
        --transform="s,^\.,khushu-${VERSION},"
        --exclude='.git' .
    - rpmbuild -bb packaging/rpm/khushu.spec
    - mkdir -p output && cp ~/rpmbuild/RPMS/**/*.rpm output/
  artifacts:
    paths:
      - output/*.rpm

# ---------------------------------------------------------------------------
# Create GitLab Release and attach packages
# ---------------------------------------------------------------------------
create-release:
  stage: release
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*/
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build-deb
      artifacts: true
    - job: build-rpm
      artifacts: true
  before_script:
    - apk add --no-cache curl
  script:
    - |
      # Upload .deb to GitLab Package Registry
      for f in output/*.deb; do
        FILENAME=$(basename "$f")
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$f" \
             "${PACKAGE_REGISTRY_URL}/${FILENAME}"
      done
    - |
      # Upload .rpm to GitLab Package Registry
      for f in output/*.rpm; do
        FILENAME=$(basename "$f")
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file "$f" \
             "${PACKAGE_REGISTRY_URL}/${FILENAME}"
      done
  release:
    tag_name: $CI_COMMIT_TAG
    name: "$CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG — .deb and .rpm packages attached below."
    assets:
      links:
        - name: "khushu_amd64.deb"
          url: "${PACKAGE_REGISTRY_URL}/khushu_${CI_COMMIT_TAG#v}_amd64.deb"
          link_type: package
        - name: "khushu_amd64.rpm"
          url: "${PACKAGE_REGISTRY_URL}/khushu-${CI_COMMIT_TAG#v}-1.fc41.x86_64.rpm"
          link_type: package
