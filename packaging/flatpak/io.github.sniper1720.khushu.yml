app-id: io.github.sniper1720.khushu
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
separate-locales: false
command: khushu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: khushu
    buildsystem: meson
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin
      env:
        CARGO_HOME: /run/build/khushu/cargo
        CARGO_NET_OFFLINE: "true"
        CARGO_BUILD_OFFLINE: "true"
        GETTEXT_SYSTEM: "1"
    sources:
      - type: dir
        path: ../../
      - cargo-sources.json
